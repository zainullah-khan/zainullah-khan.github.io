<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Documents | Zainullah Mamozi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<header class="navbar">
    <div class="logo">Zainullah Mamozi</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="cv.html">CV</a>
        <a href="projects.html">Projects</a>
        <a href="documents.html" class="active">Documents</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </nav>
</header>

<main class="page">
    <h1 class="page-title">Documents</h1>
    <p class="page-intro">
        This section is for certificates, transcripts, and other important documents.
        You can upload files here for your own reference.
    </p>

    <div class="upload-box">
        <label for="docUpload" class="upload-label">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span>Click to choose a document</span>
        </label>
        <input type="file" id="docUpload" class="upload-input">
        <p class="upload-info" id="uploadInfo">No file selected yet.</p>
    </div>

    <h2 class="section-title" style="text-align:left; margin-top:30px;">Document List</h2>
    <ul class="doc-list" id="docList">
        <li>No documents listed yet.</li>
    </ul>
</main>

<footer class="footer">
    <p>© 2026 Zainullah Mamozi.</p>
    <div class="footer-social">
        <a href="#" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
        <a href="#" aria-label="Email"><i class="fa-solid fa-envelope"></i></a>
    </div>
</footer>

<script>
const input = document.getElementById('docUpload');
const info = document.getElementById('uploadInfo');
const list = document.getElementById('docList');

input.addEventListener('change', () => {
    if (!input.files.length) return;
    const file = input.files[0];
    info.textContent = 'Selected: ' + file.name;

    if (list.children.length === 1 && list.children[0].textContent.includes('No documents')) {
        list.innerHTML = '';
    }

    const li = document.createElement('li');
    li.textContent = file.name;
    list.appendChild(li);
});
</script>
</body>
</html>
